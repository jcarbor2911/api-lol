<div class="character-wrapper" *ngIf="character">

    <header class="champion-hero" [style.backgroundImage]="'url(' + character.thumbnailUrl + ')'">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1 class="champion-name">{{ character.name }}</h1>
                <h2 class="champion-title">{{ character.title }}</h2>
            </div>
        </div>
        <div class="hero-bottom-border"></div>
    </header>

    <main class="champion-body">

        <section class="lore-section hextech-panel">
            <h3 class="hextech-sub-title">Ficha del Campeón</h3>
            <div class="gold-separator"></div>
            <p class="lore-text">
                <strong>ID de Campeón:</strong> #{{ character.championId }}
            </p>
            <p class="lore-text">
                Este campeón se encuentra completamente registrado en la base de datos Hextech de la plataforma. Puedes
                ver sus roles asignados en el panel lateral.
            </p>
        </section>

        <aside class="stats-section hextech-panel">
            <h3 class="hextech-sub-title">Roles Asignados</h3>
            <div class="gold-separator"></div>

            <div class="stats-container">
                <div class="stat-row" *ngFor="let role of character.roles">
                    <span class="stat-label"
                        style="font-size: 1.1rem; color: #0AC8B9; display: flex; align-items: center; gap: 0.5rem;">
                        ⚔️ {{ role }}
                    </span>
                </div>
            </div>
        </aside>

    </main>
</div>
