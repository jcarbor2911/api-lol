<div class="character-wrapper" *ngIf="character">

    <header class="champion-hero" [style.backgroundImage]="'url(' + character.imagen + ')'">
        <div class="hero-overlay">
            <div class="hero-content">
                <span class="champion-role">{{ character.roles }}</span>
                <h1 class="champion-name">{{ character.name }}</h1>
                <h2 class="champion-title">{{ character.title }}</h2>
            </div>
        </div>
        <div class="hero-bottom-border"></div>
    </header>

    <main class="champion-body">

        <section class="lore-section hextech-panel">
            <h3 class="hextech-sub-title">Biografía</h3>
            <div class="gold-separator"></div>
            <p class="lore-text">{{ character.descripcion }}</p>
        </section>

        <aside class="stats-section hextech-panel" *ngIf="character.estadisticas">
            <h3 class="hextech-sub-title">Estadísticas Base</h3>
            <div class="gold-separator"></div>
            
            <div class="stats-container">
                <div class="stat-row" *ngFor="let stat of character.estadisticas">
                    <span class="stat-label">{{ stat.name }}</span>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar-fill" [style.width.%]="stat.value * 10">
                            <div class="stat-bar-glow"></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

    </main>
</div>
